<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to Number Guessing Game!</h1>
    <h3>Guess the number between 1 - 100</h3><br><br>
    <input type="number" id="guess" class="input-box"><br><br>
    <button id="submit" class="submit" min="1" max="100" type="number">Guess</button>
    <br><br><br>
    <h1 id="result" class="result"></h1>
    <h2 id="attempt_score" class="result"></h2>
    <script src="index.js"></script>
</body>
</html>
